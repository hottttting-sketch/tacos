<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Tabasco 緊急ログイン（管理者・代理店用）</title>
    <!-- 公式CDNからSupabaseを読み込む（最も確実な方法） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body
    style="font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f8fafc; margin: 0; padding: 20px;">

    <div
        style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%;">
        <h1 style="color: #e60012; margin-top: 0;">Tabasco 緊急ログイン</h1>
        <p style="color: #64748b; margin-bottom: 30px;">管理者アカウント (hotta@eat.jp) で強制サインインします。</p>

        <button id="bypass-btn"
            style="width: 100%; padding: 18px; font-size: 18px; cursor:pointer; background: #e60012; color:white; border:none; border-radius:12px; font-weight: bold; transition: 0.2s;">
            Tabascoへ管理者としてログイン
        </button>

        <div id="status"
            style="margin-top: 30px; text-align: left; background: #f8fafc; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 13px; line-height: 1.5; min-height: 50px; border: 1px solid #e2e8f0; overflow-y: auto; max-height: 200px;">
            ステータス: 準備完了
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('bypass-btn');

        function log(msg, color = '#64748b') {
            const div = document.createElement('div');
            div.style.color = color;
            div.textContent = "> " + msg;
            statusEl.appendChild(div);
            statusEl.scrollTop = statusEl.scrollHeight;
        }

        btn.onclick = async () => {
            // supabase は CDN から window.supabase にロードされる
            const lib = window.supabase;
            if (!lib) {
                log('致命的エラー: ライブラリの読み込みに失敗しました。ネット接続を確認してください。', '#ef4444');
                return;
            }

            log('ログイン処理を開始...');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            try {
                const SUPABASE_URL = 'https://xijzmpmqipmzgrzrnfcs.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhpanptcG1xaXBtemdyenJuZmNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTYyNDMsImV4cCI6MjA5MjYzMjI0M30.n_PSOneRVWeeC7GDmd8puES87QAr-nhoo7Rq0obu-Ig';
                const client = lib.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

                const { data, error } = await client.auth.signInWithPassword({
                    email: 'hotta@eat.jp',
                    password: 'eateateat'
                });

                if (error) throw error;

                log('サインイン成功！ Email: ' + data.user.email, '#22c55e');
                
                // Profile Fetch
                log('プロファイル照会中...');
                const { data: profile, error: pError } = await client.from('profiles').select('*').eq('id', data.user.id).single();

                if (pError) {
                    log('警告: プロファイルが見つかりません', '#f59e0b');
                } else if (profile) {
                    localStorage.setItem('user_profile', JSON.stringify(profile));
                    log('プロファイル確認成功: ' + profile.full_name, '#22c55e');
                }

                log('数秒後にダッシュボードへ移動します...', '#0284c7');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);

            } catch (err) {
                log('エラー: ' + err.message, '#ef4444');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        };
    </script>
</body>

</html>
